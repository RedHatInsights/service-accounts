apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/service-accounts?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "main"
    pipelinesascode.tekton.dev/pipeline: https://github.com/RedHatInsights/konflux-pipelines/raw/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: service-accounts
    appstudio.openshift.io/component: service-accounts
    pipelines.appstudio.openshift.io/type: build
  name: service-accounts-on-pull-request
  namespace: rh-platform-experien-tenant
spec:
  params:
  # Git repository configuration
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/service-accounts/service-accounts:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile
  - name: path-context
    value: .
  # Unit tests configuration
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex

      npm install
      npm run lint
      npm test -- --runInBand --no-cache
      npm run build-storybook
  # E2E testing configuration
  - name: e2e-app-port
    value: "8000"
  - name: e2e-playwright-image
    value: mcr.microsoft.com/playwright:v1.58.0-jammy
  # Application startup script (Caddy serves app assets)
  - name: run-app-script
    value: |
      #!/bin/sh
      set -e

      echo "Starting application with Caddy using ConfigMap Caddyfile..."
      exec caddy run --config /etc/caddy/Caddyfile
  # E2E test execution script (Storybook tests)
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -e

      echo "Waiting for frontend-dev-proxy (port 1337)..."
      timeout 120s bash -c 'until curl -k -s -m 5 https://stage.foo.redhat.com:1337 > /dev/null 2>&1; do sleep 5; done'
      echo "Proxy ready!"

      # Start Storybook static server in background
      npx serve storybook-static -l 6006 &
      timeout 60s bash -c 'until curl -s -m 5 http://localhost:6006 > /dev/null 2>&1; do sleep 5; done'
      echo "Storybook ready!"

      # Decode E2E credentials from Vault secret (if present)
      if [ -n "${E2E_PASSWORD:-}" ]; then
        echo "$E2E_PASSWORD" | base64 -d > /tmp/e2e-credentials.sh
        trap 'rm -f /tmp/e2e-credentials.sh' EXIT
        source /tmp/e2e-credentials.sh
      fi

      # Install Playwright browsers for @storybook/test-runner
      npx playwright install --with-deps chromium

      echo "Running Storybook tests..."
      STORYBOOK_URL=http://localhost:6006 npm run test-storybook:ci
  - name: e2e-credentials-secret
    value: service-accounts-credentials-secret
  - name: frontend-proxy-routes-configmap
    value: service-accounts-dev-proxy-caddyfile
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/RedHatInsights/konflux-pipelines
    - name: revision
      value: main
    - name: pathInRepo
      value: pipelines/platform-ui/docker-build-run-all-tests.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-service-accounts
  taskRunSpecs:
  - pipelineTaskName: run-e2e-tests
    serviceAccountName: build-pipeline-service-accounts
    podTemplate:
      hostAliases:
      - ip: "::1"
        hostnames:
        - "stage.foo.redhat.com"
      - ip: "127.0.0.1"
        hostnames:
        - "stage.foo.redhat.com"
      volumes:
      - name: app-caddyfile
        configMap:
          name: service-accounts-app-caddy-config
    sidecarSpecs:
    - name: run-application
      volumeMounts:
      - name: app-caddyfile
        mountPath: /etc/caddy
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 3Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
